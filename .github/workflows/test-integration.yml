name: Integration Tests

on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - ".github/workflows/test-integration.yml"
  repository_dispatch:
    types: [trigger-main-ci]

concurrency:
  group: integration-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test-integration:
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.12"
          - "3.13"
          - "3.14"
        driver-type:
          - scylla
          - cassandra
          - acsylla
          - python-rs
        exclude:
          - python-version: "3.12"
            driver-type: scylla
          - python-version: "3.12"
            driver-type: acsylla
          - python-version: "3.12"
            driver-type: python-rs
          - python-version: "3.14"
            driver-type: cassandra
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Dependencies
        run: |
          uv sync --all-groups
          uv pip install -e ".[${{ matrix.driver-type }}]"
      - name: Run integration tests
        run: uv run pytest -m integration -v --timeout=120 --driver-type=${{ matrix.driver-type }}
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: integration
